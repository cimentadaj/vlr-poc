name: Deploy to nexusgovernance.eu/vlr-observatory

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vlr-observatory
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate data from database
        run: node scripts/generate-data.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Configure SSH deploy key for nexus_website
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NEXUS_DEPLOY_KEY }}" > ~/.ssh/nexus_deploy
          chmod 600 ~/.ssh/nexus_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'EOF'
          Host github-nexus
            HostName github.com
            User git
            IdentityFile ~/.ssh/nexus_deploy
            IdentitiesOnly yes
          EOF

      - name: Publish dist to nexus_website/vlr-observatory
        run: |
          git config --global user.email "deploy-bot@cimentadaj.dev"
          git config --global user.name "vlr-observatory deploy bot"
          git clone git@github-nexus:cimentadaj/nexus_website.git nexus
          cd nexus
          mkdir -p vlr-observatory
          rsync -a --delete ../dist/ vlr-observatory/
          git add vlr-observatory
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "Update vlr-observatory from vlr-poc@${{ github.sha }}"
          git pull --rebase origin main
          git push origin main
